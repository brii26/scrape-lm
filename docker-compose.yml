services:
  redis:
    image: redis:7-alpine
    container_name: scrape-lm-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --aof-use-rdb-preamble yes
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 10mb
      --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - scrape-lm-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scrape-lm-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env.production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scrape-lm-net

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scrape-lm-frontend
    ports: 
      - "3000:3000"
    env_file: 
      - ./frontend/.env.production
    depends_on: 
      - backend
    networks: 
      - scrape-lm-net


volumes:
  redis_data:

networks:
  scrape-lm-net:
    driver: bridge
