services:
  redis:
    image: redis:7-alpine
    container_name: scrape-lm-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --aof-use-rdb-preamble yes
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 10mb
      --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - scrape-lm-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: your-dockerhub-username/scrape-lm-backend:latest
    container_name: scrape-lm-backend
    env_file:
      - ./backend/.env.production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scrape-lm-net

  frontend:
    image: your-dockerhub-username/scrape-lm-frontend:latest
    container_name: scrape-lm-frontend
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend
    networks:
      - scrape-lm-net


  nginx:
    image: nginx:alpine
    container_name: scrape-lm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - scrape-lm-net

volumes:
  redis_data:

networks:
  scrape-lm-net:
    driver: bridge
